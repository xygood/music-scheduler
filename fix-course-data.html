<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程数据修复工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .course-info {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      padding: 15px;
      margin: 15px 0;
    }
    .course-info h3 {
      margin: 0 0 10px 0;
      color: #0369a1;
    }
    .data-row {
      display: flex;
      gap: 20px;
      margin: 5px 0;
    }
    .data-label {
      color: #666;
      min-width: 80px;
    }
    .data-value {
      font-weight: 600;
      color: #0891b2;
    }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #6d28d9;
    }
    .success {
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #166534;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
    }
    .error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 课程数据修复工具</h1>
    <p>此工具用于修复专业大课页面中以下课程的数据：</p>
    
    
    
    <button onclick="fixCourseData()">点击修复课程数据</button>
    <div id="result"></div>
  </div>

  <script>
    // 正确的课程数据
    const correctCourseData = [];
    
    function fixCourseData() {
      try {
        // 从localStorage获取现有课程数据
        const storageKey = 'music_scheduler_courses';
        const existingData = localStorage.getItem(storageKey);
        
        if (!existingData) {
          showResult('未找到课程数据，请先导入课程数据', 'error');
          return;
        }
        
        let courses = JSON.parse(existingData);
        let fixedCount = 0;
        
        // 遍历并修复课程数据
        correctCourseData.forEach(correctCourse => {
          const index = courses.findIndex(c => c.id === correctCourse.id);
          
          if (index !== -1) {
            // 更新课程数据
            courses[index] = {
              ...courses[index],
              credit_hours: correctCourse.credit_hours,
              total_hours: correctCourse.total_hours,
              weeks: correctCourse.weeks
            };
            fixedCount++;
            console.log('已修复课程:', correctCourse.course_name);
          } else {
            // 如果找不到课程，添加新课程
            courses.push(correctCourse);
            fixedCount++;
            console.log('已添加课程:', correctCourse.course_name);
          }
        });
        
        // 保存回localStorage
        localStorage.setItem(storageKey, JSON.stringify(courses));
        
        showResult(
          '✅ 课程数据修复成功！\n' +
          '已修复 ' + fixedCount + ' 门课程的数据。\n' +
          '请刷新专业大课页面查看更新后的数据。',
          'success'
        );
        
      } catch (error) {
        showResult('❌ 修复失败: ' + error.message, 'error');
        console.error('修复失败:', error);
      }
    }
    
    function showResult(message, type) {
      const resultDiv = document.getElementById('result');
      resultDiv.className = type;
      resultDiv.innerHTML = message.replace(/\n/g, '<br>');
    }
  </script>
</body>
</html>
